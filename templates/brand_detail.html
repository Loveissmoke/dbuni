{% extends 'base.html' %}

{% block content %}

<h2 class="title">{{ brand.name }} Products</h2>

<div class="grid">

  {% for product in products %}
    <div class="card"
     style="background-color: {{ product.bg_color }}; color: {{ product.text_color }};">

      <h4>{{ product.name }}</h4>
      <p class="meta">
  {{ product.gram }} g • {{ product.pieces_per_case }} pcs/case
</p>
      <p class="price">{{ product.price }} ETB</p>

      <button class="btn">Add to Cart</button>

    </div>
  {% endfor %}

</div>

{% endblock %}
